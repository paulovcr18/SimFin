<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#10141c"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <!-- Glow circle -->
  <circle cx="256" cy="230" r="160" fill="none" stroke="#5dd4a0" stroke-width="1" stroke-dasharray="8 12" opacity="0.2"/>
  <!-- Area fill under chart -->
  <polygon points="70,380 160,295 235,318 320,192 440,118 440,380"
           fill="#5dd4a0" opacity="0.07"/>
  <!-- Chart line -->
  <polyline points="70,380 160,295 235,318 320,192 440,118"
            fill="none" stroke="#5dd4a0" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="70"  cy="380" r="12" fill="#5dd4a0"/>
  <circle cx="160" cy="295" r="12" fill="#5dd4a0"/>
  <circle cx="235" cy="318" r="12" fill="#5dd4a0"/>
  <circle cx="320" cy="192" r="12" fill="#5dd4a0"/>
  <!-- Top dot highlight -->
  <circle cx="440" cy="118" r="18" fill="#0a0c10" stroke="#5dd4a0" stroke-width="6"/>
  <circle cx="440" cy="118" r="8"  fill="#5dd4a0"/>
  <!-- Gold accent dot -->
  <circle cx="320" cy="192" r="6"  fill="#e6b86a"/>
  <!-- Text -->
  <text x="256" y="460" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="#5dd4a0" text-anchor="middle" letter-spacing="4">SimFin</text>
  <text x="256" y="495" font-family="Arial, sans-serif" font-size="20"
        fill="#4d6070" text-anchor="middle" letter-spacing="2">SIMULADOR FINANCEIRO</text>
</svg>
